<html lang="pt-br"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Freitas Mercadinho</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=Nunito:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-brand">🏪 FREITAS <strong>MERCADINHO</strong></div>
    <h2>Acesso Restrito</h2>
    <p class="login-sub">Painel do Administrador</p>
    <div class="field">
      <label>Usuário</label>
      <input type="text" id="loginUser" placeholder="admin" autocomplete="username">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <p class="login-error" id="loginError"></p>
    <button class="btn-primary" id="loginBtn">Entrar</button>
  </div>
</div>

<!-- ADMIN WRAP -->
<div class="admin-wrap" id="adminWrap" style="display:none">
  <nav class="sidebar">
    <div class="sidebar-brand">🏪 <strong>FREITAS</strong></div>
    <ul>
      <li><a href="#" class="nav-link active" data-tab="orders">📋 Pedidos</a></li>
      <li><a href="#" class="nav-link" data-tab="products">🛒 Produtos</a></li>
    </ul>
    <button class="btn-logout" id="logoutBtn">↩ Sair</button>
  </nav>

  <main class="admin-main">

    <!-- PEDIDOS -->
    <section class="tab-content active" id="tab-orders">
      <div class="tab-header">
        <h1>Pedidos</h1>
        <button class="btn-refresh" id="refreshOrders">↻ Atualizar</button>
      </div>
      <div class="filter-row">
        <label>Filtrar:</label>
        <select id="statusFilter">
          <option value="">Todos</option>
          <option value="pendente">Pendente</option>
          <option value="confirmado">Confirmado</option>
          <option value="separando">Separando</option>
          <option value="entregue">Entregue</option>
          <option value="cancelado">Cancelado</option>
        </select>
      </div>
      <div id="ordersTable"></div>
    </section>

    <!-- PRODUTOS -->
    <section class="tab-content" id="tab-products">
      <div class="tab-header">
        <h1>Produtos</h1>
        <button class="btn-primary" id="addProductBtn">+ Novo Produto</button>
      </div>
      <div id="productsTable"></div>
    </section>

  </main>
</div>

<!-- PRODUCT MODAL -->
<div class="modal-overlay" id="productModal" style="display:none">
  <div class="modal-box">
    <h3 id="productModalTitle">Novo Produto</h3>
    <input type="hidden" id="productId">
    <div class="field-grid">
      <div class="field span2">
        <label>Nome do Produto *</label>
        <input type="text" id="pName" placeholder="Ex: Pão Francês">
      </div>
      <div class="field span2">
        <label>Descrição</label>
        <input type="text" id="pDesc" placeholder="Descrição curta">
      </div>
      <div class="field">
        <label>Preço (R$) *</label>
        <input type="number" id="pPrice" step="0.01" min="0" placeholder="0,00">
      </div>
      <div class="field">
        <label>Unidade</label>
        <select id="pUnit">
          <option value="un">un (unidade)</option>
          <option value="kg">kg (quilo)</option>
          <option value="pct">pct (pacote)</option>
          <option value="pé">pé</option>
          <option value="lt">lt (litro)</option>
          <option value="cx">cx (caixa)</option>
        </select>
      </div>
      <div class="field">
        <label>Categoria</label>
        <select id="pCategory">
          <option value="Pães">🍞 Pães</option>
          <option value="Hortifruti">🥦 Hortifruti</option>
          <option value="Cereais">🌾 Cereais</option>
          <option value="Bebidas">🍺 Bebidas</option>
          <option value="Outros">📦 Outros</option>
        </select>
      </div>
      <div class="field">
        <label>Status</label>
        <select id="pActive">
          <option value="1">✅ Ativo</option>
          <option value="0">❌ Inativo</option>
        </select>
      </div>
      <div class="field span2">
        <label>URL da Imagem</label>
        <input type="url" id="pImg" placeholder="https://...">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="productModalCancel">Cancelar</button>
      <button class="btn-primary" id="productModalSave">Salvar Produto</button>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="confirmModal" style="display:none">
  <div class="modal-box small">
    <h3>Desativar produto?</h3>
    <p>O produto ficará oculto no cardápio mas pode ser reativado a qualquer momento.</p>
    <div class="modal-actions">
      <button class="btn-secondary" id="confirmCancel">Cancelar</button>
      <button class="btn-danger" id="confirmOk">Desativar</button>
    </div>
  </div>
</div>

<script src="/static/js/admin.js"></script>


</body></html>
